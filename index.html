<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🐱 Mesajlar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #f2f2f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }

        .phone {
            max-width: 420px;
            width: 100%;
            background: #ffffff;
            border-radius: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12);
            overflow: hidden;
            padding: 20px 16px 12px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            padding: 0 4px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-left .back {
            font-size: 24px;
            cursor: pointer;
            color: #2d2d2d;
        }

        .header-left .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #D8C7FF;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .header-left .name {
            font-weight: 600;
            font-size: 16px;
            color: #1c1c1e;
        }

        .header-right {
            display: flex;
            gap: 12px;
            color: #2d2d2d;
            font-size: 18px;
            cursor: pointer;
        }

        .messages {
            display: flex;
            flex-direction: column;
            gap: 10px;
            height: 380px;
            overflow-y: auto;
            padding: 8px 4px 12px;
            background: #faf9fc;
            border-radius: 24px;
            margin-bottom: 12px;
            border: 1px solid #f0f0f5;
        }

        .message {
            max-width: 80%;
            padding: 10px 16px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
            animation: fadeIn 0.25s ease;
        }

        .message.from-888 {
            align-self: flex-start;
            background: #f0f0f0;
            color: #1c1c1e;
            border-bottom-left-radius: 6px;
        }

        .message.from-555 {
            align-self: flex-end;
            background: linear-gradient(135deg, #CFEFFF, #D8C7FF, #FFD1E8);
            color: #1c1c1e;
            border-bottom-right-radius: 6px;
        }

        .message .time {
            font-size: 10px;
            opacity: 0.5;
            margin-top: 4px;
            display: block;
            text-align: right;
        }

        .message .sender-label {
            font-size: 11px;
            font-weight: 600;
            opacity: 0.7;
            margin-bottom: 3px;
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .input-area {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f8f9fc;
            border-radius: 50px;
            padding: 4px 6px 4px 18px;
            margin-top: 6px;
            border: 2px solid #e8e8ed;
            transition: all 0.2s;
        }

        .input-area:focus-within {
            border-color: #D8C7FF;
            box-shadow: 0 0 0 4px rgba(216, 199, 255, 0.2);
        }

        .input-area input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 12px 0;
            font-size: 15px;
            outline: none;
        }

        .input-area input::placeholder {
            color: #999;
        }

        .input-area button {
            width: 44px;
            height: 44px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #CFEFFF, #D8C7FF, #FFD1E8);
            font-size: 20px;
            cursor: pointer;
            color: #1c1c1e;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .input-area button:hover {
            transform: scale(1.04);
            box-shadow: 0 4px 14px rgba(216, 199, 255, 0.3);
        }

        .info-text {
            text-align: center;
            font-size: 12px;
            color: #999;
            margin-top: 12px;
            padding: 6px;
            background: #f5f5fa;
            border-radius: 30px;
        }

        .info-text span {
            font-weight: 500;
            color: #555;
        }

        .dual-input {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 6px;
        }

        .dual-input .input-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dual-input .input-row .label {
            font-size: 12px;
            font-weight: 600;
            color: #666;
            background: #f0f0f5;
            padding: 4px 12px;
            border-radius: 30px;
            white-space: nowrap;
            min-width: 58px;
            text-align: center;
        }

        .dual-input .input-row input {
            flex: 1;
            padding: 10px 16px;
            border: 1.5px solid #e8e8ed;
            border-radius: 50px;
            font-size: 14px;
            outline: none;
            background: #faf9fc;
            transition: all 0.2s;
        }

        .dual-input .input-row input:focus {
            border-color: #D8C7FF;
            background: white;
            box-shadow: 0 0 0 3px rgba(216, 199, 255, 0.15);
        }

        .dual-input .input-row button {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #CFEFFF, #D8C7FF, #FFD1E8);
            font-size: 18px;
            cursor: pointer;
            color: #1c1c1e;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .dual-input .input-row button:hover {
            transform: scale(1.05);
        }

        .clear-btn {
            margin-top: 10px;
            text-align: center;
            font-size: 13px;
            color: #999;
            cursor: pointer;
            padding: 6px;
            border-radius: 30px;
            background: #f5f5fa;
            transition: all 0.2s;
        }

        .clear-btn:hover {
            background: #ececf2;
        }
    </style>
</head>
<body>

<div class="phone">
    <!-- BAŞLIK -->
    <div class="header">
        <div class="header-left">
            <span class="back">←</span>
            <span class="avatar">🐱</span>
            <span class="name">Mesajlar</span>
        </div>
        <div class="header-right">
            <span>📞</span>
            <span>✎</span>
        </div>
    </div>

    <!-- KONUŞMA BAŞLIĞI -->
    <div style="display: flex; justify-content: space-between; align-items: center; padding: 0 4px 10px; border-bottom: 1px solid #f0f0f5;">
        <div style="display: flex; align-items: center; gap: 10px;">
            <span style="font-size: 28px;">🐾</span>
            <div>
                <div style="font-weight: 600; font-size: 15px; color: #1c1c1e;">+1 888 555-1212</div>
                <div style="font-size: 12px; color: #888;">ile +1 555 564-8583</div>
            </div>
        </div>
        <div style="font-size: 14px; color: #666; background: #f0f0f5; padding: 4px 14px; border-radius: 30px;">💬</div>
    </div>

    <!-- MESAJ ALANI -->
    <div class="messages" id="messageContainer">
        <div class="message from-888">
            <span class="sender-label">888</span>
            Merhaba! Bu bir test mesajı.
            <span class="time">12:00</span>
        </div>
        <div class="message from-555">
            <span class="sender-label">555</span>
            Selam! Mesajlaşma simülasyonu çalışıyor.
            <span class="time">12:02</span>
        </div>
        <div class="message from-888">
            <span class="sender-label">888</span>
            Harika! Karşılıklı yazışma var.
            <span class="time">12:03</span>
        </div>
    </div>

    <!-- İKİ AYRI GİRİŞ ALANI -->
    <div class="dual-input">
        <!-- 888 -->
        <div class="input-row">
            <span class="label">888</span>
            <input type="text" id="input888" placeholder="888 olarak yaz..." />
            <button id="send888">↑</button>
        </div>
        <!-- 555 -->
        <div class="input-row">
            <span class="label">555</span>
            <input type="text" id="input555" placeholder="555 olarak yaz..." />
            <button id="send555">↑</button>
        </div>
    </div>

    <!-- TEMİZLE -->
    <div class="clear-btn" id="clearBtn">🗑️ Tüm mesajları temizle</div>

    <!-- BİLGİ -->
    <div class="info-text">
        <span>+1 888 555-1212</span> ↔ <span>+1 555 564-8583</span>
    </div>
</div>

<script>
    const messageContainer = document.getElementById('messageContainer');
    const input888 = document.getElementById('input888');
    const input555 = document.getElementById('input555');
    const send888 = document.getElementById('send888');
    const send555 = document.getElementById('send555');
    const clearBtn = document.getElementById('clearBtn');

    function getTime() {
        const now = new Date();
        const h = String(now.getHours()).padStart(2, '0');
        const m = String(now.getMinutes()).padStart(2, '0');
        return h + ':' + m;
    }

    function addMessage(text, sender) {
        const div = document.createElement('div');
        div.className = 'message from-' + sender;
        div.innerHTML = `<span class="sender-label">${sender}</span>${text}<span class="time">${getTime()}</span>`;
        messageContainer.appendChild(div);
        messageContainer.scrollTop = messageContainer.scrollHeight;
    }

    function sendFrom888() {
        const text = input888.value.trim();
        if (text === '') return;
        addMessage(text, '888');
        input888.value = '';
    }

    function sendFrom555() {
        const text = input555.value.trim();
        if (text === '') return;
        addMessage(text, '555');
        input555.value = '';
    }

    // Olaylar
    send888.addEventListener('click', sendFrom888);
    send555.addEventListener('click', sendFrom555);

    input888.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') sendFrom888();
    });

    input555.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') sendFrom555();
    });

    clearBtn.addEventListener('click', function() {
        messageContainer.innerHTML = '';
    });

    // Başlangıçta sona kaydır
    setTimeout(() => {
        messageContainer.scrollTop = messageContainer.scrollHeight;
    }, 100);
</script>

</body>
</html>
