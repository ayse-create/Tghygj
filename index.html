<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>404 - ProfessorCat</title>

  <!-- Arista Pro yoksa fallback font çalışır -->
  <style>
    body {
      margin: 0;
      background: #d9d9d9;
      font-family: "Arista Pro", Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      max-width: 500px;
    }

    img {
      width: 180px;
      margin-top: -40px;
    }

    .title {
      font-size: 28px;
      font-weight: bold;
    }

    .title .prof {
      color: #000;
    }

    .title .cat {
      color: #777;
    }

    .subtitle {
      font-size: 14px;
      color: #333;
    }

    .error {
      font-size: 90px;
      color: #888;
      font-weight: bold;
      margin-top: 10px;
    }

    .link {
      font-size: 16px;
      margin-top: 10px;
    }

    .link a {
      text-decoration: underline;
      color: #777;
      cursor: pointer;
    }

    .link span {
      color: #000;
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- Görsel -->
    <img src="ProfesorCat kopyası.png" alt="ProfessorCat">

    <!-- Başlık -->
    <div class="title">
      <span class="prof">Professor</span><span class="cat">Cat</span>
    </div>

    <!-- Açıklama -->
    <div class="subtitle">
      Sayfa bulunamadı. Taşınmış veya kaldırılmış olabilir.
    </div>

    <!-- 404 -->
    <div class="error">404</div>

    <!-- Link -->
    <div class="link">
      <a href="https://ayse-create.github.io/WhiskerSearch/">
        <span>anasayfaya</span> dön
      </a>
    </div>

  </div>

</body>
</html>
