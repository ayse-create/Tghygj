<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>🐱 Mesajlar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #f2f2f7;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px 12px;
            background: #ffffff;
            border-bottom: 1px solid #e8e8ed;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-left .back {
            font-size: 28px;
            cursor: pointer;
            color: #2d2d2d;
        }

        .header-left .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #D8C7FF;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .header-left .name {
            font-weight: 600;
            font-size: 17px;
            color: #1c1c1e;
        }

        .header-right {
            display: flex;
            gap: 18px;
            color: #2d2d2d;
            font-size: 20px;
            cursor: pointer;
        }

        .contact-list {
            display: flex;
            gap: 12px;
            padding: 12px 20px;
            background: #f8f9fc;
            border-bottom: 1px solid #e8e8ed;
            flex-shrink: 0;
            overflow-x: auto;
        }

        .contact-chip {
            padding: 8px 20px;
            border-radius: 30px;
            background: #f0f0f5;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: #555;
            transition: all 0.2s;
            border: 1.5px solid transparent;
            white-space: nowrap;
        }

        .contact-chip.active {
            background: #D8C7FF;
            color: #1c1c1e;
            border-color: #c0b0e8;
        }

        .contact-chip:hover {
            background: #e8e4f0;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #faf9fc;
        }

        .message {
            max-width: 70%;
            padding: 10px 16px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
            animation: fadeIn 0.2s ease;
        }

        .message.sent {
            align-self: flex-end;
            background: linear-gradient(135deg, #CFEFFF, #D8C7FF, #FFD1E8);
            color: #1c1c1e;
            border-bottom-right-radius: 4px;
        }

        .message.received {
            align-self: flex-start;
            background: #f0f0f0;
            color: #1c1c1e;
            border-bottom-left-radius: 4px;
        }

        .message .time {
            font-size: 10px;
            opacity: 0.5;
            margin-top: 4px;
            display: block;
            text-align: right;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-area {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            border-top: 1px solid #e8e8ed;
            background: #ffffff;
            flex-shrink: 0;
        }

        .input-area input {
            flex: 1;
            padding: 12px 18px;
            border: 1.5px solid #e8e8ed;
            border-radius: 30px;
            font-size: 15px;
            outline: none;
            background: #f8f9fc;
            transition: all 0.2s;
            min-width: 0;
        }

        .input-area input:focus {
            border-color: #D8C7FF;
            background: white;
            box-shadow: 0 0 0 4px rgba(216, 199, 255, 0.15);
        }

        .input-area button {
            width: 48px;
            height: 48px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #CFEFFF, #D8C7FF, #FFD1E8);
            font-size: 22px;
            cursor: pointer;
            color: #1c1c1e;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .input-area button:hover {
            transform: scale(1.04);
            box-shadow: 0 4px 14px rgba(216, 199, 255, 0.3);
        }

        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 15px;
            flex-direction: column;
            gap: 8px;
            height: 100%;
        }

        .empty-state .big-icon { font-size: 48px; }

        .messages::-webkit-scrollbar { width: 4px; }
        .messages::-webkit-scrollbar-thumb { background: #d0d0d5; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-left">
            <span class="back">←</span>
            <span class="avatar">🐱</span>
            <span class="name">Mesajlar</span>
        </div>
        <div class="header-right">
            <span>📞</span>
            <span>✎</span>
        </div>
    </div>

    <div class="contact-list" id="contactList">
        <span class="contact-chip active" data-contact="888">🐾 +1 888 555-1212</span>
        <span class="contact-chip" data-contact="555">🐱 +1 555 564-8583</span>
    </div>

    <div class="messages" id="messageContainer">
        <div class="empty-state">
            <div class="big-icon">💬</div>
            <div>Henüz mesaj yok</div>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="messageInput" placeholder="Mesaj yaz..." />
        <button id="sendButton">↑</button>
    </div>

<script>
    let messages = {
        '888': [],
        '555': []
    };

    let currentContact = '888';

    const messageContainer = document.getElementById('messageContainer');
    const messageInput = document.getElementById('messageInput');
    const sendButton = document.getElementById('sendButton');
    const contactChips = document.querySelectorAll('.contact-chip');

    function getTime() {
        const now = new Date();
        const h = String(now.getHours()).padStart(2, '0');
        const m = String(now.getMinutes()).padStart(2, '0');
        return h + ':' + m;
    }

    function renderMessages(contact) {
        const msgs = messages[contact] || [];
        if (msgs.length === 0) {
            messageContainer.innerHTML = `
                <div class="empty-state">
                    <div class="big-icon">💬</div>
                    <div>Henüz mesaj yok</div>
                </div>
            `;
            return;
        }
        messageContainer.innerHTML = '';
        msgs.forEach(msg => {
            const div = document.createElement('div');
            div.className = 'message ' + (msg.sender === 'sent' ? 'sent' : 'received');
            div.innerHTML = msg.text + `<span class="time">${getTime()}</span>`;
            messageContainer.appendChild(div);
        });
        messageContainer.scrollTop = messageContainer.scrollHeight;
    }

    function switchContact(contact) {
        currentContact = contact;
        contactChips.forEach(chip => {
            chip.classList.toggle('active', chip.dataset.contact === contact);
        });
        renderMessages(contact);
        messageInput.focus();
    }

    function addMessage(contact, text, sender) {
        if (!messages[contact]) messages[contact] = [];
        messages[contact].push({ text, sender });
    }

    function sendMessage() {
        if (!currentContact) return;
        const text = messageInput.value.trim();
        if (text === '') return;

        // Mesajı yazılan kişiye (currentContact) ekle
        addMessage(currentContact, text, 'sent');
        messageInput.value = '';

        // Karşı tarafa (diğer numara) mesaj gitmiş gibi simüle et
        const otherContact = currentContact === '888' ? '555' : '888';
        // Karşı tarafın mesajlarını güncelle (received olarak)
        addMessage(otherContact, text, 'received');

        // Eğer karşı taraf açık değilse, mesaj kaydedilir ama görünmez
        // Sadece currentContact değiştiğinde render edilir
        if (currentContact === otherContact) {
            renderMessages(otherContact);
        } else {
            // Mevcut kontağı render et (değişen bir şey yok ama göster)
            renderMessages(currentContact);
        }
    }

    contactChips.forEach(chip => {
        chip.addEventListener('click', function() {
            switchContact(this.dataset.contact);
        });
    });

    sendButton.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') sendMessage();
    });

    switchContact('888');
</script>

</body>
</html>
