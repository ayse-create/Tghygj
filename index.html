<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🐱 Mesajlar – Manuel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #f2f2f7;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .window {
            width: 100%;
            max-width: 900px;
            height: 90vh;
            max-height: 700px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .titlebar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            background: #f5f5f7;
            border-bottom: 1px solid #e8e8ed;
            flex-shrink: 0;
        }

        .titlebar .dots {
            display: flex;
            gap: 8px;
        }
        .titlebar .dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
        }
        .titlebar .dot.red { background: #ff5f56; }
        .titlebar .dot.yellow { background: #ffbd2e; }
        .titlebar .dot.green { background: #27c93f; }

        .titlebar .title {
            flex: 1;
            text-align: center;
            font-weight: 600;
            font-size: 14px;
            color: #555;
        }

        .main {
            display: flex;
            flex: 1;
            min-height: 0;
        }

        .sidebar {
            width: 240px;
            background: #f8f9fc;
            border-right: 1px solid #e8e8ed;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 12px 16px;
            font-weight: 600;
            font-size: 14px;
            color: #555;
            border-bottom: 1px solid #e8e8ed;
        }

        .contact-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            cursor: pointer;
            transition: all 0.15s;
            border-radius: 8px;
            margin: 0 6px;
        }

        .contact-item:hover { background: #f0f0f5; }
        .contact-item.active { background: #e8e8f0; }

        .contact-item .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #D8C7FF;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .contact-item .info {
            flex: 1;
            min-width: 0;
        }
        .contact-item .info .name {
            font-weight: 600;
            font-size: 14px;
            color: #1c1c1e;
        }
        .contact-item .info .preview {
            font-size: 13px;
            color: #888;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #ffffff;
            min-width: 0;
        }

        .chat-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            border-bottom: 1px solid #e8e8ed;
            flex-shrink: 0;
        }

        .chat-header .ch-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #D8C7FF;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        .chat-header .ch-name {
            font-weight: 600;
            font-size: 15px;
            color: #1c1c1e;
        }
        .chat-header .ch-status {
            font-size: 12px;
            color: #888;
            margin-left: 4px;
        }

        /* MESAJLAR */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #faf9fc;
        }

        .message-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 70%;
        }
        .message-wrapper.sent { align-self: flex-end; }
        .message-wrapper.received { align-self: flex-start; }

        .cat-bubble {
            position: relative;
            padding: 12px 18px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
            animation: fadeIn 0.2s ease;
        }

        .cat-bubble::before,
        .cat-bubble::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            background: inherit;
            border-radius: 0 50% 0 50%;
            top: -8px;
        }

        .message-wrapper.received .cat-bubble::before {
            left: -4px;
            transform: rotate(0deg);
        }
        .message-wrapper.received .cat-bubble::after {
            left: 10px;
            transform: rotate(0deg);
            border-radius: 50% 0 0 50%;
        }

        .message-wrapper.sent .cat-bubble::before {
            right: -4px;
            transform: scaleX(-1) rotate(0deg);
        }
        .message-wrapper.sent .cat-bubble::after {
            right: 10px;
            transform: scaleX(-1) rotate(0deg);
            border-radius: 50% 0 0 50%;
        }

        .message-wrapper.sent .cat-bubble {
            background: linear-gradient(135deg, #CFEFFF, #D8C7FF, #FFD1E8);
            color: #1c1c1e;
        }
        .message-wrapper.received .cat-bubble {
            background: #f0f0f0;
            color: #1c1c1e;
        }

        .message-wrapper .time {
            font-size: 10px;
            opacity: 0.5;
            margin-top: 4px;
            display: block;
            text-align: right;
            padding-right: 4px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* INPUT ALANI */
        .input-area {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            border-top: 1px solid #e8e8ed;
            background: #ffffff;
            flex-shrink: 0;
        }

        .input-area input {
            flex: 1;
            padding: 10px 16px;
            border: 1.5px solid #e8e8ed;
            border-radius: 30px;
            font-size: 15px;
            outline: none;
            background: #f8f9fc;
            transition: all 0.2s;
            min-width: 0;
        }

        .input-area input:focus {
            border-color: #D8C7FF;
            background: white;
            box-shadow: 0 0 0 4px rgba(216, 199, 255, 0.15);
        }

        .input-area button {
            width: 44px;
            height: 44px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #CFEFFF, #D8C7FF, #FFD1E8);
            font-size: 20px;
            cursor: pointer;
            color: #1c1c1e;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .input-area button:hover {
            transform: scale(1.04);
            box-shadow: 0 4px 14px rgba(216, 199, 255, 0.3);
        }

        .empty-state {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 15px;
            flex-direction: column;
            gap: 8px;
        }

        .empty-state .big-icon { font-size: 48px; }

        .messages::-webkit-scrollbar,
        .contact-list::-webkit-scrollbar {
            width: 4px;
        }
        .messages::-webkit-scrollbar-thumb,
        .contact-list::-webkit-scrollbar-thumb {
            background: #d0d0d5;
            border-radius: 10px;
        }

        @media (max-width: 600px) {
            body { padding: 0; }
            .window { border-radius: 0; max-height: 100vh; height: 100vh; }
            .sidebar { width: 180px; }
        }

        .sender-label {
            font-size: 11px;
            font-weight: 600;
            opacity: 0.6;
            margin-bottom: 4px;
            display: block;
        }
    </style>
</head>
<body>

<div class="window">
    <div class="titlebar">
        <div class="dots">
            <span class="dot red"></span>
            <span class="dot yellow"></span>
            <span class="dot green"></span>
        </div>
        <div class="title">🐱 Mesajlar</div>
        <div style="width:68px;"></div>
    </div>

    <div class="main">
        <div class="sidebar">
            <div class="sidebar-header">Kişiler</div>
            <div class="contact-list" id="contactList">
                <div class="contact-item active" data-contact="888">
                    <div class="avatar">🐾</div>
                    <div class="info">
                        <div class="name">+1 888 555-1212</div>
                        <div class="preview" id="preview888">Merhaba!</div>
                    </div>
                </div>
                <div class="contact-item" data-contact="555">
                    <div class="avatar">🐱</div>
                    <div class="info">
                        <div class="name">+1 555 564-8583</div>
                        <div class="preview" id="preview555">Selam!</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="chat-area">
            <div class="chat-header">
                <div class="ch-avatar" id="chatAvatar">🐱</div>
                <div>
                    <span class="ch-name" id="chatName">+1 888 555-1212</span>
                    <span class="ch-status" id="chatStatus">● Çevrimiçi</span>
                </div>
            </div>

            <div class="messages" id="messageContainer">
                <div class="empty-state">
                    <div class="big-icon">💬</div>
                    <div>Bir kişi seçin</div>
                </div>
            </div>

            <div class="input-area" style="flex-direction: column; gap: 8px; align-items: stretch;">
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="input888" placeholder="888 olarak yaz..." />
                    <button id="send888">↑</button>
                </div>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="input555" placeholder="555 olarak yaz..." />
                    <button id="send555">↑</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let messages = {
        '888': [
            { text: 'Merhaba!', sender: 'received' },
            { text: 'Nasılsın?', sender: 'sent' }
        ],
        '555': [
            { text: 'Selam!', sender: 'received' },
            { text: 'İyi gidiyor.', sender: 'sent' }
        ]
    };

    let currentContact = '888';

    const contactList = document.getElementById('contactList');
    const messageContainer = document.getElementById('messageContainer');
    const input888 = document.getElementById('input888');
    const input555 = document.getElementById('input555');
    const send888 = document.getElementById('send888');
    const send555 = document.getElementById('send555');
    const chatName = document.getElementById('chatName');
    const chatAvatar = document.getElementById('chatAvatar');
    const chatStatus = document.getElementById('chatStatus');
    const preview888 = document.getElementById('preview888');
    const preview555 = document.getElementById('preview555');

    function getTime() {
        const now = new Date();
        const h = String(now.getHours()).padStart(2, '0');
        const m = String(now.getMinutes()).padStart(2, '0');
        return h + ':' + m;
    }

    function renderMessages(contact) {
        const msgs = messages[contact] || [];
        if (msgs.length === 0) {
            messageContainer.innerHTML = `
                <div class="empty-state">
                    <div class="big-icon">💬</div>
                    <div>Henüz mesaj yok</div>
                </div>
            `;
            return;
        }
        messageContainer.innerHTML = '';
        msgs.forEach(msg => {
            const wrapper = document.createElement('div');
            wrapper.className = 'message-wrapper ' + (msg.sender === 'sent' ? 'sent' : 'received');

            const bubble = document.createElement('div');
            bubble.className = 'cat-bubble';
            bubble.textContent = msg.text;

            const time = document.createElement('span');
            time.className = 'time';
            time.textContent = getTime();

            wrapper.appendChild(bubble);
            wrapper.appendChild(time);
            messageContainer.appendChild(wrapper);
        });
        messageContainer.scrollTop = messageContainer.scrollHeight;
    }

    function updatePreviews() {
        const msgs888 = messages['888'] || [];
        const msgs555 = messages['555'] || [];
        preview888.textContent = msgs888.length > 0 ? msgs888[msgs888.length - 1].text : 'Yeni sohbet';
        preview555.textContent = msgs555.length > 0 ? msgs555[msgs555.length - 1].text : 'Yeni sohbet';
    }

    function switchContact(contact) {
        currentContact = contact;
        document.querySelectorAll('.contact-item').forEach(el => {
            el.classList.toggle('active', el.dataset.contact === contact);
        });
        const name = contact === '888' ? '+1 888 555-1212' : '+1 555 564-8583';
        const avatar = contact === '888' ? '🐾' : '🐱';
        chatName.textContent = name;
        chatAvatar.textContent = avatar;
        chatStatus.textContent = contact === '888' ? '● Çevrimiçi' : '● Son görülme: 12:02';
        renderMessages(contact);
    }

    function addMessage(contact, text, sender) {
        if (!messages[contact]) messages[contact] = [];
        messages[contact].push({ text, sender });
        if (currentContact === contact) renderMessages(contact);
        updatePreviews();
    }

    function sendFrom888() {
        const text = input888.value.trim();
        if (text === '') return;
        addMessage('888', text, 'sent');
        input888.value = '';
    }

    function sendFrom555() {
        const text = input555.value.trim();
        if (text === '') return;
        addMessage('555', text, 'sent');
        input555.value = '';
    }

    contactList.addEventListener('click', function(e) {
        const item = e.target.closest('.contact-item');
        if (item) switchContact(item.dataset.contact);
    });

    send888.addEventListener('click', sendFrom888);
    send555.addEventListener('click', sendFrom555);

    input888.addEventListener('keypress', function(e) { if (e.key === 'Enter') sendFrom888(); });
    input555.addEventListener('keypress', function(e) { if (e.key === 'Enter') sendFrom555(); });

    switchContact('888');
</script>

</body>
</html>
